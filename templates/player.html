<!DOCTYPE html>
<html>
<head>

<title>Auction</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

</head>

<body class="bg-gray-100 p-10">

<h1 class="text-4xl font-bold mb-8">
IPL Auction Dashboard
</h1>


<div id="teams" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10"></div>


<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

{% for player in players %}

<div class="bg-white rounded-xl shadow-lg p-5">

<img
src="/static/players/{{player[4]}}"
class="w-full h-48 object-cover rounded"
>

<h2 class="text-xl font-bold mt-3">
{{player[1]}}
</h2>

<p class="text-gray-500">
Role: {{player[2]}}
</p>

<p class="text-green-600 font-semibold">
Base Price ₹{{player[3]}}
</p>

<button
onclick="startAuction({{player[0]}})"
class="bg-blue-600 text-white px-4 py-2 rounded mt-3">

Start Auction

</button>

<button
onclick="loadBidHistory({{player[0]}})"
class="bg-gray-700 text-white px-4 py-2 rounded mt-2">

View Bids

</button>

</div>

{% endfor %}

</div>


<div class="mt-10">

<h2 class="text-2xl font-bold mb-4">
Bid History
</h2>

<ul id="bidHistory" class="bg-white p-4 rounded shadow">

</ul>

</div>


<script>

function startAuction(player_id){

fetch(`/start_auction/${player_id}`)
.then(res=>res.text())
.then(data=>{
alert("Auction started")
})

}



function loadBidHistory(player_id){

fetch(`/bid_history/${player_id}`)
.then(res=>res.json())
.then(data=>{

let list = document.getElementById("bidHistory")
list.innerHTML=""

data.bids.forEach(bid=>{

let li = document.createElement("li")

li.innerText = bid[0] + " bid ₹" + bid[1]

list.appendChild(li)

})

})

}



function loadTeams(){

fetch("/teams")
.then(res=>res.json())
.then(data=>{

let div = document.getElementById("teams")
div.innerHTML=""

data.teams.forEach(team=>{

let card = document.createElement("div")

card.className="bg-yellow-100 p-4 rounded shadow"

card.innerHTML = `
<h3 class="font-bold">${team[0]}</h3>
<p>₹${team[1]} Cr remaining</p>
`

div.appendChild(card)

})

})

}

loadTeams()

</script>

</body>
</html>
