<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script src="/static/js/script.js"></script>

</head>

<body>

<div class="container">

<h1>{{player[1]}}</h1>

<p>Role: {{player[3]}}</p>
<p>Country: {{player[2]}}</p>

<h3>Highest Bid: ₹<span id="highestBid">{{highest}}</span></h3>

<form action="/bid" method="POST">

<input type="hidden" name="player_id" value="{{player[0]}}">

<input name="bidder" placeholder="Your name">

<input name="amount" placeholder="Bid amount">

<button class="btn btn-success">
Place Bid
</button>

</form>

</div>

</body>
</html>
