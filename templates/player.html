<!DOCTYPE html>
<html>

<head>

<script src="https://cdn.tailwindcss.com"></script>
<script src="/static/script.js"></script>

</head>

<body class="bg-gray-100">

<div class="p-10">

<h1 class="text-4xl font-bold">{{player[1]}}</h1>

<p>{{player[2]}} | {{player[3]}}</p>

<img src="{{player[5]}}" class="w-64 mt-4">

<h2 class="text-2xl mt-4">

Highest Bid:
<span id="highestBid">
₹{{highest}}
</span>

</h2>

<form action="/bid/{{player[0]}}" method="POST" class="mt-4">

<input name="bid"
class="border p-2">

<button class="bg-green-500 text-white px-4 py-2">

Place Bid

</button>

</form>

</div>

<script>

setInterval(function(){

fetch("/highest_bid/{{player[0]}}")
.then(res=>res.json())
.then(data=>{
document.getElementById("highestBid").innerText="₹"+data.bid
})

},2000)

</script>

</body>

</html>
