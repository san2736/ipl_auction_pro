<!DOCTYPE html>
<html>

<head>

<title>IPL Auction</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-indigo-900 text-white p-6 text-center text-3xl font-bold">

IPL Auction Marketplace

</div>

<div class="p-6">

<form method="GET">

<input name="search" placeholder="Search players"
class="p-2 border w-1/3">

<select name="role" class="p-2 border">
<option value="">All Roles</option>
<option>Batsman</option>
<option>Bowler</option>
<option>All-rounder</option>
</select>

<button class="bg-blue-500 text-white px-4 py-2">
Search
</button>

</form>

</div>

<div class="grid grid-cols-4 gap-6 p-6">

{% for p in players %}

<a href="/player/{{p[0]}}">

<div class="bg-white shadow-lg rounded-xl p-4 hover:scale-105 transition">

<img src="{{p[5]}}" class="h-40 w-full object-cover">

<h2 class="text-xl font-bold mt-2">{{p[1]}}</h2>

<p>{{p[2]}}</p>
<p>{{p[3]}}</p>

<p class="text-green-600">
Base ₹{{p[4]}}
</p>

</div>

</a>

{% endfor %}

</div>

</body>

</html>
