<!DOCTYPE html>
<html>
<head>

<title>IPL Auction</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">

<h1 class="title">IPL Auction Marketplace</h1>

<input class="form-control search" placeholder="Search players">

<div class="row">

{% for p in players %}

<div class="col-md-3">

<div class="card player-card">

<div class="card-body">

<h4>{{p[1]}}</h4>

<p>{{p[2]}}</p>

<p>{{p[3]}}</p>

<p>Base: ₹{{p[4]}}</p>

<p class="bid">Highest: ₹{{p[5]}}</p>

<a href="/player/{{p[0]}}" class="btn btn-primary">
Bid Now
</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
